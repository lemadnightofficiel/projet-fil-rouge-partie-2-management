<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClientIQ</title>
<link rel="stylesheet" href="styles/globals.css"/>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <div class="logo-mark">ClientIQ</div>
    <div class="logo-sub">Gestion portefeuille</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Données</div>
    <div class="nav-item active" onclick="navigate('import')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 10l3-3 3 3M8 7v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Import CSV
    </div>
    <div class="nav-item" onclick="navigate('apercu')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 6h14" stroke="currentColor" stroke-width="1.2"/><path d="M5 9h2M5 11.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Aperçu données
    </div>
    <div class="nav-section">Analyse</div>
    <div class="nav-item" onclick="navigate('dashboard')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="navigate('recos')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Recommandations
    </div>
    <div class="nav-section">Pilotage</div>
    <div class="nav-item" onclick="navigate('actions')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Actions
    </div>
    <div class="nav-item" onclick="navigate('journal')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M3 3h10v10H3z" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 6h6M5 8.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Journal
    </div>
    <div class="nav-section">Admin</div>
    <div class="nav-item" onclick="navigate('securite')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2L3 4v4c0 3 2.5 5.5 5 6 2.5-.5 5-3 5-6V4L8 2z" stroke="currentColor" stroke-width="1.2"/></svg>
      Sécurité
    </div>
  </nav>
  <div class="role-badge">
    <div class="role-label">Rôle actif</div>
    <div class="role-name" id="current-role-display">Admin</div>
    <div class="role-switch" onclick="toggleRole()">Changer de rôle</div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Import CSV</div>
    <div class="topbar-actions">
      <span style="font-size:11px;color:var(--text2);font-family:sans-serif;padding:7px 0;" id="data-status">Aucune donnée chargée</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="modal-overlay">
  <div class="modal" id="modal-body">
  </div>
</div>

<div id="toast"></div>

<script></script>
</body>
</html>
